<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    /* GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      transition: 0.4s;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .card h4 {
      margin: 10px;
      font-size: 16px;
    }

    .card p {
      margin: 0 10px;
      font-size: 13px;
      color: #555;
    }

    /* BUTTONS */
    .price-btn {
      background: linear-gradient(135deg, black, #444);
      color: white;
      border: none;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      width: calc(100% - 20px);
    }

    .view-btn {
      background: linear-gradient(135deg, teal, #00b3b3);
      color: white;
      border: none;
      padding: 10px;
      margin: 0 10px 15px;
      border-radius: 8px;
      width: calc(100% - 20px);
    }

    /* LOADER + ERROR */
    #loader {
      text-align: center;
      font-size: 20px;
    }

    #error {
      text-align: center;
      color: red;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

    .modal img {
      width: 100%;
      height: 200px;
      object-fit: contain;
    }

    /* BADGE */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: crimson;
      color: white;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h1>🛍 Product Dashboard</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Search products...">

  <select id="category">
    <option value="">All Categories</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelery</option>
    <option value="men's clothing">Men</option>
    <option value="women's clothing">Women</option>
  </select>

  <button onclick="sortProducts('low')">Low → High</button>
  <button onclick="sortProducts('high')">High → Low</button>
</div>

<div id="loader">Loading...</div>
<div id="error"></div>

<div class="products" id="productContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h3 id="modalTitle"></h3>
    <img id="modalImage">
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>
  </div>
</div>

<script src="Task8.js"></script>
</body>
</html>
